# Entry Control System - Facial Recognition Access Control
# 
# Entry Control System by geortick
# Images: ghcr.io/geortick/entry-control-backend:1.0, ghcr.io/geortick/entry-control-frontend:1.0
# Deploy with: podman play kube entry-control-pod.yaml
# Access at: http://localhost:8080 (main) | http://localhost:8080/admin.html (admin)
# Default admin credentials: admin/admin
# GitHub Container Registry: https://github.com/geortick?tab=packages
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: entry-control-system
  name: entry-control-pod
spec:
  containers:
  # MongoDB Database
  - name: mongo-db
    image: docker.io/library/mongo:latest
    args:
    - mongod
    env:
    - name: MONGO_INITDB_ROOT_USERNAME
      value: mongo_user
    - name: MONGO_INITDB_ROOT_PASSWORD
      value: mongo_pass
    ports:
    - containerPort: 27017
    volumeMounts:
    - mountPath: /data/db
      name: mongo-data
    - mountPath: /data/configdb
      name: mongo-config

  # Python FastAPI Backend
  - name: backend
    image: ghcr.io/geortick/entry-control-backend:1.0
    env:
    - name: MONGO_URI
      value: mongodb://mongo_user:mongo_pass@localhost:27017
    ports:
    - containerPort: 8000
      hostPort: 8000

  # Nginx Frontend  
  - name: frontend
    image: ghcr.io/geortick/entry-control-frontend:1.0
    ports:
    - containerPort: 80
      hostPort: 8080

  volumes:
  - name: mongo-data
    emptyDir: {}
  - name: mongo-config
    emptyDir: {}

